name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 10
          run_install: false

      # Node 24 bundles npm 11.x. Trusted publishing requires npm >= 11.5.1
      # to perform the OIDC token exchange; Node 22 ships npm 10.x and falls
      # back to an unauthenticated PUT, which the registry answers with a
      # 404 (looks like "package not found" but is really an auth mismatch).
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Verify tag commit is on main
        working-directory: .
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Refusing to publish: tag commit is not on main"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm run typecheck

      - name: Check test types
        run: pnpm run test:typecheck

      - name: Run tests
        run: pnpm run test

      - name: Check formatting
        run: pnpm run format:check

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF##*/}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version v$PKG_VERSION"
            exit 1
          fi

      - name: Verify plugin versions match package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./plugins/grepmax/.claude-plugin/plugin.json').version")
          MARKET_VERSION=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "plugin.json version ($PLUGIN_VERSION) != package.json ($PKG_VERSION)"
            echo "Run: bash scripts/sync-versions.sh"
            exit 1
          fi
          if [ "$PKG_VERSION" != "$MARKET_VERSION" ]; then
            echo "marketplace.json version ($MARKET_VERSION) != package.json ($PKG_VERSION)"
            echo "Run: bash scripts/sync-versions.sh"
            exit 1
          fi

      - name: Build
        run: pnpm build

      # Audit the npm tarball to ensure no source code or internal files leak.
      #
      # Why this exists: In March 2025, a major project accidentally shipped
      # its entire internal source tree through npm because the package.json
      # "files" whitelist was too broad. Internal feature flags, security
      # architecture details, employee-only code paths, and A/B test
      # infrastructure were all publicly readable on the registry.
      #
      # Our "files" field in package.json whitelists: dist/, .claude-plugin/,
      # plugins/, mlx-embed-server/, and scripts/postinstall.js. This step
      # verifies that ONLY those paths end up in the tarball. If something
      # unexpected appears — a src/ file, a .env, test fixtures, internal docs
      # — this fails the release before it reaches the registry.
      #
      # Run `npm pack --dry-run` locally to preview what would ship.
      - name: Audit npm tarball for source leaks
        run: |
          npm pack --dry-run --ignore-scripts --json > pack.json
          node <<'NODE'
          const fs = require('node:fs');
          const pack = JSON.parse(fs.readFileSync('pack.json', 'utf8'))[0];
          const allowed = /^(dist\/|\.claude-plugin\/|plugins\/|mlx-embed-server\/|scripts\/postinstall\.js$|package\.json$|README\.md$|LICENSE$|NOTICE$)/;
          const leaked = pack.files.map((f) => f.path).filter((p) => !allowed.test(p));
          if (leaked.length) {
            console.error('ERROR: Unexpected files in npm tarball:');
            for (const file of leaked) console.error(`  - ${file}`);
            console.error('If these files are intentional, add them to package.json files and this audit allow-list.');
            process.exit(1);
          }
          console.log('Tarball audit passed — no unexpected files.');
          NODE

      # Publish via npm CLI with OIDC (trusted publishing on npmjs.com).
      # No NPM_TOKEN needed — id-token: write on this job lets npm exchange
      # a short-lived OIDC token for a publish credential. Provenance is
      # auto-generated for public repos publishing public packages, so no
      # --provenance flag. Install/build above still use pnpm.
      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub Release (tag only, no assets)
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "GitHub Release ${{ github.ref_name }} already exists."
          else
            gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
